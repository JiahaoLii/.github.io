<div style="width: 100%; text-align: center; padding-top: 28px; padding-bottom: 16px; border-bottom: 1px solid #eeeeee;">
  <div style="font-size: 36px; font-weight: 700; line-height: 1.25; color: #333333; letter-spacing: 0.01em;">
    Jiahao Li（李佳昊）
  </div>
  <div style="margin-top: 8px; font-size: 18px; font-weight: 400; color: #666666; letter-spacing: 0.04em;">
    Photonics · AI for Science
  </div>
</div>

<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button><div class="navicon"></div></button>
        <ul class="visible-links">
          {% for link in site.data.navigation.main %}
            <li class="masthead__menu-item{% if forloop.first %} masthead__menu-item--lg masthead__menu-home-item{% endif %}">
              <a href="{{ link.url | relative_url }}">{{ link.title }}</a>
            </li>
          {% endfor %}
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
  </div>
</div>
